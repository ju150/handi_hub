name: handi_hub
description: Application Flutter accessible pour personnes en situation de handicap moteur.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^14.6.2
  # Stockage local
  shared_preferences: ^2.3.3
  # PDF
  syncfusion_flutter_pdfviewer: ^29.1.40
  # Liens externes
  url_launcher: ^6.3.1
  # Partage
  share_plus: ^10.1.4
  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pdfs/
